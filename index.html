<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/styles.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script type="module" src="./src/scripts/main.js" defer></script>
    <title>Windbnb - Finland Stays</title>
</head>
<body class="font-sans bg-white">

    <header class="p-6 md:px-16 flex flex-row justify-between items-center">
    <img src="./src/images/icons/logo-f7862584.svg" alt="logo" class="h-6">
    
    <div id="open-search" class="flex items-center shadow-md border border-gray-100 rounded-2xl overflow-hidden cursor-pointer divide-x bg-white">
        <div class="px-4 py-3 text-sm min-w-30" id="display-location">Add location</div>
        <div class="px-4 py-3 text-sm text-gray-400 min-w-30" id="display-guests-count">Add guests</div>
        <div class="px-4 py-3"><span class="material-icons text-[#EB5757]">search</span></div>
    </div>
</header>

    <div id="search-modal" class="fixed inset-0 bg-black/50 z-50 hidden transition-opacity">
        <div class="bg-white w-full p-6 md:p-16 h-auto shadow-2xl animate-slide-down">
            <div class="flex justify-between items-center md:hidden mb-6">
                <span class="font-bold text-xs">Edit your search</span>
                <span id="close-search" class="material-icons cursor-pointer">close</span>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 border border-gray-100 rounded-2xl shadow-sm">
                <div class="p-3 border-b md:border-b-0 md:border-r border-gray-100 relative">
                    <label class="block uppercase text-[9px] font-extrabold px-3">Location</label>
                    <input type="text" id="city-input" placeholder="Add location" class="w-full px-3 py-1 outline-none text-sm" readonly>
                    <div id="location-list" class="absolute left-0 top-full mt-4 w-full bg-white hidden flex-col gap-4 py-2">
                        </div>
                </div>

                <div class="p-3">
                    <label class="block uppercase text-[9px] font-extrabold px-3">Guests</label>
                    <input type="text" id="guests-display" placeholder="Add guests" class="w-full px-3 py-1 outline-none text-sm" readonly>
                </div>

                <div class="hidden md:flex items-center justify-center p-3">
                    <button id="search-btn" class="bg-[#EB5757] text-white px-6 py-3 rounded-2xl flex items-center gap-2 hover:bg-[#d44d4d] transition-colors">
                        <span class="material-icons text-sm">search</span> Search
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 mt-8">
                <div></div> <div class="flex flex-col gap-8 px-6">
                    <div>
                        <p class="font-bold text-sm">Adults</p>
                        <p class="text-gray-400 text-sm mb-3">Ages 13 or above</p>
                        <div class="flex items-center gap-4">
                            <button id="adult-minus" class="border border-gray-500 rounded w-6 h-6 flex items-center justify-center text-gray-500">-</button>
                            <span id="adult-count" class="font-bold text-sm">0</span>
                            <button id="adult-plus" class="border border-gray-500 rounded w-6 h-6 flex items-center justify-center text-gray-500">+</button>
                        </div>
                    </div>
                    <div>
                        <p class="font-bold text-sm">Children</p>
                        <p class="text-gray-400 text-sm mb-3">Ages 2-12</p>
                        <div class="flex items-center gap-4">
                            <button id="child-minus" class="border border-gray-500 rounded w-6 h-6 flex items-center justify-center text-gray-500">-</button>
                            <span id="child-count" class="font-bold text-sm">0</span>
                            <button id="child-plus" class="border border-gray-500 rounded w-6 h-6 flex items-center justify-center text-gray-500">+</button>
                        </div>
                    </div>
                </div>
                <div class="md:hidden mt-12 flex justify-center">
                    <button id="search-btn-mobile" class="bg-[#EB5757] text-white px-8 py-4 rounded-2xl flex items-center gap-2">
                        <span class="material-icons">search</span> Search
                    </button>
                </div>
            </div>
        </div>
    </div>

    <main class="max-w-7xl mx-auto p-6 md:px-16 mt-4">
    <div class="flex justify-between items-center mb-8">
        <h2 class="text-2xl font-bold text-gray-800" id="location-title">Stays in Finland</h2>
        <span id="counter" class="text-gray-600 text-sm font-medium">12+ stays</span>
    </div>

    <div id="stays-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-8 gap-y-12">
    </div>
</main>

</body>
</html>
